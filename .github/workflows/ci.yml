name: CardioSense AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check . --select=E,F,I --ignore=E501

      - name: Generate mock model weights
        run: python app/ml/train_mock.py
        env:
          PYTHONPATH: .

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: ci-test-secret-key-for-github-actions-only
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          OPENAI_API_KEY: ""
          MODEL_PATH: app/ml/ecg_autoencoder.pt
          ANOMALY_THRESHOLD: "0.05"

  # ── Frontend Build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://cardiosense-api.example.com
          VITE_WS_URL: wss://cardiosense-api.example.com

  # ── Docker Build Validation ──────────────────────────────────────────────
  docker-validate:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: cardiosense-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: cardiosense-frontend:ci
          build-args: |
            VITE_API_URL=https://cardiosense-api.example.com
            VITE_WS_URL=wss://cardiosense-api.example.com
